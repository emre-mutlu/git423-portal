name: Deploy to Netlify

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: platform/package-lock.json

      - name: Install dependencies
        working-directory: platform
        run: npm ci

      - name: Build
        working-directory: platform
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          npm run build
          cat > .netlify/v1/functions/ssr/ssr.mjs <<'WRAPPER_EOF'
          import { createHandler } from './.netlify/build/entry.mjs';
          const baseHandler = createHandler({});
          export default async function handler(request, context) {
            try {
              return await baseHandler(request, context);
            } catch (err) {
              return new Response(
                'DIAGNOSTIC ERROR\n\n' +
                'Message: ' + (err?.message || 'no message') + '\n\n' +
                'Stack:\n' + (err?.stack || 'no stack') + '\n\n' +
                'Context type: ' + typeof context + '\n' +
                'Context keys: ' + (context ? Object.keys(context).join(', ') : 'N/A'),
                { status: 500, headers: { 'content-type': 'text/plain; charset=utf-8' } }
              );
            }
          }
          export const config = {
            includedFiles: ['**/*'],
            name: 'Astro SSR',
            nodeBundler: 'none',
            generator: '@astrojs/netlify@7.0.9',
            path: '/*',
            preferStatic: true,
          };
          WRAPPER_EOF

      - name: Deploy to Netlify
        working-directory: platform
        run: npx netlify-cli@latest deploy --prod --site ${{ secrets.NETLIFY_SITE_ID }} --auth ${{ secrets.NETLIFY_AUTH_TOKEN }}
