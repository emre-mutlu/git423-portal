name: Deploy to Cloudflare Workers

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: platform/package-lock.json

      - name: Install dependencies
        working-directory: platform
        run: npm ci

      - name: Build
        working-directory: platform
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: npm run build

      - name: Inject KV namespace ID into wrangler.json
        working-directory: platform
        env:
          KV_SESSION_ID: ${{ secrets.CLOUDFLARE_KV_SESSION_ID }}
        run: |
          jq --arg id "$KV_SESSION_ID" \
            '.kv_namespaces[0].id = $id | .previews.kv_namespaces[0].id = $id' \
            dist/server/wrangler.json > dist/server/wrangler.json.tmp
          mv dist/server/wrangler.json.tmp dist/server/wrangler.json

      - name: Deploy to Cloudflare Workers
        working-directory: platform
        run: npx wrangler deploy --name git423-portal
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
